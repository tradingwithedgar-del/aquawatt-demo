<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AquaWatt — Water Analytics Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: #0B1520; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;
const {
  AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid,
  Tooltip, ResponsiveContainer, Legend, ReferenceLine,
} = Recharts;

const C = {
  bg: "#0B1520", panel: "#121F2E", panelEdge: "#1D2F42",
  water: "#4FC3E8", waterDim: "#2A7FA3", heat: "#F5A343",
  alert: "#E86A5C", ok: "#5CC98F", text: "#DCE7F0",
  muted: "#7C93A6", faint: "#3A4F63",
};
const F = {
  display: "'Barlow Condensed', 'Arial Narrow', sans-serif",
  body: "'IBM Plex Sans', 'Segoe UI', sans-serif",
  mono: "'IBM Plex Mono', 'Courier New', monospace",
};

const HOURS = [...Array(24).keys()];
function makeHourly() {
  return HOURS.map((h) => {
    const tempFactor = 0.55 + 0.45 * Math.sin(((h - 5) / 24) * Math.PI * 2) ** 2 * (h > 9 && h < 21 ? 1.35 : 0.7);
    const evapGal = Math.round(3400 * tempFactor + 260 * Math.sin(h * 1.7));
    const hybridGal = Math.round(evapGal * (h > 10 && h < 18 ? 0.22 : 0.04));
    return { hour: `${String(h).padStart(2, "0")}:00`, evaporative: evapGal, hybridDry: hybridGal };
  });
}
const MONTHS = ["Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr","May","Jun","Jul"];
function makeMonthly() {
  return MONTHS.map((m, i) => {
    const summer = i < 2 || i > 8;
    const gal = summer ? 2.31 + Math.random() * 0.32 : 1.42 + Math.random() * 0.4;
    return { month: m, MGal: +gal.toFixed(2) };
  });
}
const fmt = (n) => n.toLocaleString("en-US");

function Panel({ title, tag, children, style }) {
  return (
    <div style={{ background: C.panel, border: `1px solid ${C.panelEdge}`, borderRadius: 10, padding: "16px 18px", ...style }}>
      {title && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
          <div style={{ fontFamily: F.display, fontSize: 17, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", color: C.text }}>{title}</div>
          {tag && <div style={{ fontFamily: F.mono, fontSize: 11, color: C.muted }}>{tag}</div>}
        </div>
      )}
      {children}
    </div>
  );
}

function Metric({ label, value, unit, color, sub }) {
  return (
    <div style={{ minWidth: 120 }}>
      <div style={{ fontFamily: F.mono, fontSize: 11, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontFamily: F.mono, fontSize: 32, fontWeight: 600, color: color || C.text, lineHeight: 1.15 }}>
        {value}<span style={{ fontSize: 14, color: C.muted, marginLeft: 5 }}>{unit}</span>
      </div>
      {sub && <div style={{ fontFamily: F.body, fontSize: 12, color: C.muted, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function ChartTip({ active, payload, label, unit }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{ background: C.bg, border: `1px solid ${C.panelEdge}`, borderRadius: 8, padding: "8px 12px", fontFamily: F.mono, fontSize: 12 }}>
      <div style={{ color: C.muted, marginBottom: 4 }}>{label}</div>
      {payload.map((p) => (
        <div key={p.dataKey} style={{ color: p.color || p.stroke }}>{p.name}: {fmt(p.value)} {unit}</div>
      ))}
    </div>
  );
}

function AquaWatt() {
  const hourly = useMemo(makeHourly, []);
  const monthly = useMemo(makeMonthly, []);
  const [gallonsToday, setGallonsToday] = useState(41890);
  const [strategy, setStrategy] = useState("evap");

  useEffect(() => {
    const id = setInterval(() => setGallonsToday((g) => g + Math.round(0.8 + Math.random() * 0.4)), 1000);
    return () => clearInterval(id);
  }, []);

  const annual = useMemo(() => {
    const evapMGalYr = 22.4, hybridMGalYr = 2.1, waterCostPerKGal = 4.85;
    const savedMGal = evapMGalYr - hybridMGalYr;
    return {
      evapMGalYr, hybridMGalYr, savedMGal,
      savedDollars: savedMGal * 1000 * waterCostPerKGal,
      households: Math.round((savedMGal * 1e6) / (300 * 365)),
    };
  }, []);

  const wue = strategy === "evap" ? 1.84 : 0.19;
  const pue = strategy === "evap" ? 1.38 : 1.46;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: F.body, padding: "0 0 40px" }}>
      <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 24px", borderBottom: `1px solid ${C.panelEdge}`, flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <div style={{ fontFamily: F.display, fontSize: 26, fontWeight: 700, letterSpacing: "0.05em" }}>
            AQUA<span style={{ color: C.water }}>WATT</span>
          </div>
          <div style={{ fontFamily: F.mono, fontSize: 12, color: C.muted }}>Facility TX-HOU-01 · 12 MW IT load</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: F.mono, fontSize: 12 }}>
          <span style={{ width: 8, height: 8, borderRadius: 4, background: C.ok, display: "inline-block" }} />
          <span style={{ color: C.ok }}>TELEMETRY LIVE</span>
        </div>
      </header>

      <main style={{ maxWidth: 1180, margin: "0 auto", padding: "20px 16px", display: "grid", gap: 16 }}>
        <Panel style={{ display: "flex", flexWrap: "wrap", gap: 28, alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontFamily: F.mono, fontSize: 11, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Fresh water consumed today</div>
            <div style={{ fontFamily: F.mono, fontSize: 46, fontWeight: 600, color: C.water, lineHeight: 1.1 }}>
              {fmt(gallonsToday)}<span style={{ fontSize: 16, color: C.muted, marginLeft: 8 }}>gal</span>
            </div>
            <div style={{ fontFamily: F.body, fontSize: 13, color: C.muted, marginTop: 4 }}>
              ≈ daily water supply for <span style={{ color: C.text }}>{fmt(Math.round(gallonsToday / 300))}</span> Houston households — and counting
            </div>
          </div>
          <div style={{ display: "flex", gap: 30, flexWrap: "wrap" }}>
            <Metric label="WUE" value={wue.toFixed(2)} unit="L/kWh" color={wue > 1 ? C.alert : C.ok} sub={wue > 1 ? "Above 1.0 target" : "Within target"} />
            <Metric label="PUE" value={pue.toFixed(2)} unit="" color={C.heat} sub="Power usage effectiveness" />
            <Metric label="Cooling mode" value={strategy === "evap" ? "EVAP" : "HYBRID"} unit="" color={strategy === "evap" ? C.alert : C.ok} sub={strategy === "evap" ? "Evaporative towers" : "Dry + greywater assist"} />
          </div>
        </Panel>

        <Panel title="Water draw — last 24 h" tag="gal/hr by cooling strategy">
          <div style={{ width: "100%", height: 240 }}>
            <ResponsiveContainer>
              <AreaChart data={hourly} margin={{ top: 6, right: 8, left: -8, bottom: 0 }}>
                <defs>
                  <linearGradient id="gEvap" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.water} stopOpacity={0.45} />
                    <stop offset="100%" stopColor={C.water} stopOpacity={0.03} />
                  </linearGradient>
                  <linearGradient id="gHyb" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.ok} stopOpacity={0.4} />
                    <stop offset="100%" stopColor={C.ok} stopOpacity={0.03} />
                  </linearGradient>
                </defs>
                <CartesianGrid stroke={C.faint} strokeDasharray="2 6" vertical={false} />
                <XAxis dataKey="hour" tick={{ fill: C.muted, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={{ stroke: C.faint }} interval={3} />
                <YAxis tick={{ fill: C.muted, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={false} />
                <Tooltip content={<ChartTip unit="gal/hr" />} />
                <Legend wrapperStyle={{ fontFamily: F.mono, fontSize: 12 }} />
                <Area type="monotone" dataKey="evaporative" name="Evaporative (current)" stroke={C.water} strokeWidth={2} fill="url(#gEvap)" />
                <Area type="monotone" dataKey="hybridDry" name="Hybrid dry (modeled)" stroke={C.ok} strokeWidth={2} fill="url(#gHyb)" />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </Panel>

        <div style={{ display: "grid", gap: 16, gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))" }}>
          <Panel title="Monthly consumption" tag="million gal">
            <div style={{ width: "100%", height: 220 }}>
              <ResponsiveContainer>
                <BarChart data={monthly} margin={{ top: 6, right: 8, left: -14, bottom: 0 }}>
                  <CartesianGrid stroke={C.faint} strokeDasharray="2 6" vertical={false} />
                  <XAxis dataKey="month" tick={{ fill: C.muted, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={{ stroke: C.faint }} />
                  <YAxis tick={{ fill: C.muted, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={false} />
                  <Tooltip content={<ChartTip unit="MGal" />} cursor={{ fill: "#1D2F4266" }} />
                  <ReferenceLine y={1.6} stroke={C.heat} strokeDasharray="4 4" label={{ value: "target", fill: C.heat, fontSize: 11, fontFamily: F.mono, position: "insideTopRight" }} />
                  <Bar dataKey="MGal" name="Water" fill={C.waterDim} radius={[3, 3, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </Panel>

          <Panel title="Savings simulator" tag="annualized">
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              {[{ key: "evap", label: "Current: Evaporative" }, { key: "hybrid", label: "Modeled: Hybrid dry" }].map((opt) => (
                <button key={opt.key} onClick={() => setStrategy(opt.key)}
                  style={{
                    flex: 1, padding: "9px 10px", borderRadius: 8, cursor: "pointer",
                    fontFamily: F.mono, fontSize: 12,
                    background: strategy === opt.key ? C.panelEdge : "transparent",
                    color: strategy === opt.key ? C.text : C.muted,
                    border: `1px solid ${strategy === opt.key ? C.water : C.faint}`,
                  }}>
                  {opt.label}
                </button>
              ))}
            </div>
            <div style={{ display: "grid", gap: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: F.mono, fontSize: 13 }}>
                <span style={{ color: C.muted }}>Annual fresh water</span>
                <span style={{ color: strategy === "evap" ? C.alert : C.ok }}>
                  {strategy === "evap" ? annual.evapMGalYr : annual.hybridMGalYr} MGal
                </span>
              </div>
              <div style={{ height: 10, borderRadius: 5, background: C.faint, overflow: "hidden" }}>
                <div style={{
                  height: "100%", borderRadius: 5,
                  width: `${(strategy === "evap" ? annual.evapMGalYr : annual.hybridMGalYr) / annual.evapMGalYr * 100}%`,
                  background: strategy === "evap" ? C.alert : C.ok, transition: "width 500ms ease",
                }} />
              </div>
              {strategy === "hybrid" ? (
                <div style={{ borderTop: `1px solid ${C.panelEdge}`, paddingTop: 12, display: "grid", gap: 6 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 13, display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: C.muted }}>Water saved / yr</span>
                    <span style={{ color: C.ok }}>{annual.savedMGal.toFixed(1)} MGal</span>
                  </div>
                  <div style={{ fontFamily: F.mono, fontSize: 13, display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: C.muted }}>Utility cost saved / yr</span>
                    <span style={{ color: C.ok }}>${fmt(Math.round(annual.savedDollars))}</span>
                  </div>
                  <div style={{ fontFamily: F.body, fontSize: 12, color: C.muted, marginTop: 2 }}>
                    Equivalent to the yearly water supply of ~{fmt(annual.households)} households.
                  </div>
                </div>
              ) : (
                <div style={{ fontFamily: F.body, fontSize: 12, color: C.muted }}>
                  Switch to the modeled strategy to see projected savings.
                </div>
              )}
            </div>
          </Panel>
        </div>

        <div style={{ fontFamily: F.mono, fontSize: 11, color: C.faint, textAlign: "center" }}>
          AQUAWATT demo · simulated telemetry · fictional facility
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AquaWatt />);
</script>
</body>
</html>
